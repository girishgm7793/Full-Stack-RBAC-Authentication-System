# -----------------------------------------------
# Server
# -----------------------------------------------
server.port=8080

# -----------------------------------------------
# MySQL - update username/password as needed
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/rbac_db
spring.datasource.username=girishsql
spring.datasource.password=7793
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------
# JPA / Hibernate
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -----------------------------------------------
# Run data.sql AFTER Hibernate creates tables
# -----------------------------------------------
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# -----------------------------------------------
# JWT Config
# -----------------------------------------------
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# -----------------------------------------------
# Swagger UI: http://localhost:8080/swagger-ui/index.html
# -----------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true
